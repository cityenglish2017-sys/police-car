<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Owen Police Car Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <header>
      <h1>🚔 Owen Police Control Center</h1>
      <div id="scoreBox">해결한 사건 ⭐ <span id="score">0</span></div>
    </header>

    <main id="controlRoom">
      <section id="policeStation">
        <div class="stationTitle">👮 경찰 상황실</div>
        <div id="officer">👮‍♂️</div>
        <div id="callScreen">☎ 신고 대기 중...</div>
        <button id="newCallBtn">📞 신고 전화 받기</button>
      </section>

      <section id="cityMap">
        <div class="mapTitle">🗺 Owen City</div>

        <div class="place" id="bank">🏦<br>은행</div>
        <div class="place" id="school">🏫<br>학교</div>
        <div class="place" id="park">🌳<br>공원</div>
        <div class="place" id="road">🚦<br>도로</div>
        <div class="place" id="garage">🔧<br>정비소</div>

        <div id="eventIcon">🚓</div>
      </section>

      <section id="commandPanel">
        <div class="panelTitle">🚨 출동 명령</div>

        <button data-action="patrol">🚓 경찰차 출동</button>
        <button data-action="arrest">👮 도둑 체포</button>
        <button data-action="traffic">🚦 교통정리</button>
        <button data-action="tow">🚛 견인차 호출</button>
        <button data-action="repair">👨‍🔧 정비공 호출</button>
        <button data-action="help">📝 민원 처리</button>
      </section>
    </main>

    <footer id="message">
      신고 전화를 받고 알맞은 경찰 업무 버튼을 눌러주세요.
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
